services:
  - type: web
    name: amma-english-coach
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: TRANSLATION_PROVIDER_ORDER
        value: sarvam,gemini,openrouter,mymemory
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_MODEL
        value: sarvam-translate:v1
      - key: SARVAM_CHAT_MODEL
        value: sarvam-30b
      - key: SARVAM_TUTOR_MODEL
        value: sarvam-30b
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openrouter/free
      - key: MYMEMORY_CONTACT_EMAIL
        sync: false
